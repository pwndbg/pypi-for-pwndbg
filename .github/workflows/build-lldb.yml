name: internal release lldb

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
        description: 'What os?'
      attribute:
        required: true
        type: string
        description: 'What attribute?'

jobs:
  build-lldb:
    runs-on: ${{ inputs.os }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        version: [
          310,
#          311,
#          312,
#          313,
#          314,
#          315,
        ]
    permissions:
      contents: write  # IMPORTANT: mandatory for github-release upload
    steps:

    - uses: actions/checkout@c85c95e3d7251135ab7dc9ce3241c5835cc595a9  # @v3
    - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72  # @v30
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: mk dist
      run: |
        mkdir dist

    - name: build
      run: |
        nix build '.#${{ inputs.attribute }}.${{ matrix.version }}.debug' -o ./result
        cp ./result/* ./dist/

    - name: Upload to draft GitHub Release
      if: github.ref_type == 'tag'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        draft: true  # keep mutable so all arches (incl. manual top-ups) can be added before publish
        name: "LLDB Release ${{ github.ref_name }}"
        body: "Automatically built packages for ${{ github.ref_name }}"
        prerelease: ${{ contains(github.ref_name, 'dev') }}
        files: |
          dist/*.whl
          dist/*.debug.tar.xz
